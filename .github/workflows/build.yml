name: Build redact-pdf

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run tests
        run: uv run --group dev pytest -v

  build-windows:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller PyMuPDF customtkinter windnd

      - name: Build exe
        run: pyinstaller gui.spec

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/redact-pdf.exe
          generate_release_notes: true

  build-macos:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller PyMuPDF customtkinter

      - name: Build app bundle
        run: pyinstaller gui-macos.spec

      - name: Zip app bundle
        run: cd dist && zip -r redact-pdf-macos.zip redact-pdf.app

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/redact-pdf-macos.zip
          generate_release_notes: false
